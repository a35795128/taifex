name: 每日期貨籌碼爬蟲

on:
  schedule:
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴套件
        run: |
          pip install requests beautifulsoup4 gspread google-auth pandas

      - name: 第一次執行爬蟲（3:10）
        id: first_run
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python "台指期籌碼自動抓取系統.py"
        continue-on-error: true

      - name: 等待 20 分鐘後重試
        if: steps.first_run.outcome == 'failure'
        run: sleep 1200

      - name: 第二次執行爬蟲（3:30）
        if: steps.first_run.outcome == 'failure'
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python "台指期籌碼自動抓取系統.py"

      - name: 提交歷史快取更新
        if: success() || steps.first_run.outcome == 'failure'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 歷史快取.json
          git diff --cached --quiet || git commit -m "自動更新歷史快取"
          git push
